<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f5f5f5; }
        model-viewer { width: 100%; height: 100dvh; }
        .ar-button {
            background-color: #000;
            color: white;
            border-radius: 30px;
            border: none;
            position: absolute;
            bottom: 120px; 
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 28px;
            font-weight: bold;
            font-size: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            white-space: nowrap;
            z-index: 9999;
        }
    </style>
</head>
<body>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

<model-viewer 
  src="leather_bag_v2_pbr_material-v1.glb" 
  ios-src="Leather_Bag_v2_PBR_Material.usdz" 
  ar 
  ar-modes="webxr scene-viewer quick-look" 
  ar-scale="auto"
  ar-placement="floor"
  camera-controls 
  touch-action="none"
  shadow-intensity="1" 
  auto-rotate 
  interaction-prompt="auto">
  
  <button slot="ar-button" class="ar-button">
    🛍️ XEM TRONG KHÔNG GIAN THẬT (AR)
  </button>

</model-viewer>

</body>
</html>
